# https://taskfile.dev

version: '3'

tasks:
  default:
    silent: true
    cmds:
      - task -l

  wsl:
    desc: Install wsl-open utility
    cmds:
      - npm install -g wsl-open

  mise:
    desc: Install mise-en-place
    cmds:
      - curl https://mise.run | sh

  fzf:
    desc: Install fzf command-line fuzzy finder
    cmds:
      - git -C ~/.fzf pull 2>/dev/null || git clone --depth 1 https://github.com/junegunn/fzf.git ~/.fzf && ~/.fzf/install

  pass:
    desc: Install Proton Pass CLI
    cmds:
      - curl -fsSL https://proton.me/download/pass-cli/install.sh | bash

  opencode:
    desc: Install open source AI coding agent
    cmds:
      - curl -fsSL https://opencode.ai/install | bash

  atuin:
    desc: Atuin for magical shell history
    cmds:
      - bash <(curl --proto '=https' --tlsv1.2 -sSf https://setup.atuin.sh)

  lsp:
    desc: Install TailwindCSS and vscode language servers
    cmds:
      - npm install -g @olrtg/emmet-language-server @tailwindcss/language-server vscode-langservers-extracted

  gems:
    desc: Install gems for Ruby on Rails development
    cmds:
      - gem install bundler-audit easy_translate erb_lint herb i18n-tasks neovim
          rubocop rubocop-minitest rubocop-performance rubocop-rails
          rubocop-rails-omakase ruby-lsp ruby-lsp-rails

  chrome-headless:
    desc: Download the latest chrome driver and headless shell
    dir: /tmp
    vars:
      VERSION:
        sh: curl https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions.json | jq -r '.channels.Stable.version'
    cmds:
      - curl -O https://storage.googleapis.com/chrome-for-testing-public/{{.VERSION}}/win64/chromedriver-win64.zip
      - curl -O https://storage.googleapis.com/chrome-for-testing-public/{{.VERSION}}/linux64/chrome-headless-shell-linux64.zip
      - unzip -u chromedriver-win64.zip
      - unzip -u chrome-headless-shell-linux64.zip
      - rm -rf ~/.local/bin/chrome-headless-shell-linux64/
      - mv -v chromedriver-win64/chromedriver.exe "`readlink $(which chromedriver)`"
      - mv -v chrome-headless-shell-linux64/ ~/.local/bin/
